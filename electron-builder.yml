# ============================================================================
# PNU PLIDE — electron-builder 배포 설정
# ============================================================================
#
# 정책:
#   - 교육용이므로 Apple/Microsoft 코드 서명 및 공증(notarization) 없이 배포.
#   - IDE Shell 자체는 auto-update 를 하지 않음 (publish: null).
#     Interpreter 업데이트만 앱 내부 custom updater 가 S3 → ~/.pnu-pl-ide/bin/
#     으로 hot-swap.
#   - 첫 실행 시 macOS Gatekeeper / Windows SmartScreen 경고 발생은 운영상
#     감수하고, docs/phase7-build.md 에서 우회 방법을 학생에게 안내.
#
# 향후 서명 도입 시 수정해야 할 곳:
#   - mac.identity:         Apple Developer ID Application 인증서 이름
#   - mac.notarize:         teamId (Developer Account)
#   - win.certificateFile / win.certificatePassword 또는 sign 스크립트
#   - publish: (electron-updater 복구 시) 실제 배포 서버 정보
# ============================================================================

appId: edu.pusan.pl.ide
productName: PLIDE
copyright: © 2026 Pusan National University Programming Languages Lab

# ----------------------------------------------------------------------------
# 빌드 시점 package.json override.
#
# package.json 의 `description` 은 GitHub/npm 카탈로그용으로 한 줄 설명을
#유지하지만, Windows .exe 의 VersionInfo.FileDescription 으로 그대로 박히면
# 작업표시줄 호버 툴팁/작업관리자 표시명에 80자가 통째로 노출되어 부적절.
#
# 여기서 빌드 사본의 description 만 짧게 override 한다 — 원본 package.json 은
# 손대지 않는다 (소스 / 검색 메타데이터는 긴 버전 유지).
# ----------------------------------------------------------------------------
extraMetadata:
  description: PLIDE

directories:
  buildResources: build
  output: dist

files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintrc.cjs,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'

asar: true
asarUnpack:
  - resources/**

# ----------------------------------------------------------------------------
# Windows — NSIS 인스톨러만 배포
#
#  - nsis: 일반 학생용 (바탕화면 바로가기 자동 생성)
#
#  portable 타겟은 제거됨. 사유:
#    1. 설치형(nsis) + 포터블을 병행하면 릴리즈 자산 크기가 약 2배로 불어남.
#    2. 교육용 배포 특성상 "설치" 경로를 표준으로 통일하는 편이 학부생 안내가
#       단순하다 (SmartScreen 우회 절차도 한 가지로 정리).
#    3. 포터블 실행 시 %APPDATA% 대신 임시 경로를 쓰는데, 이 경우 ~/.pnu-pl-ide/
#       과 분리되어 인터프리터 캐시가 중복 다운로드되는 부작용이 있음.
#
#  서명 없음: publisherName 을 빈 문자열로 두면 NSIS 가 경고를 최소화.
#  SmartScreen 은 무서명 실행 파일에 대해 "알 수 없는 게시자" 표기.
# ----------------------------------------------------------------------------
win:
  executableName: PLIDE
  artifactName: ${name}-${version}-${arch}.${ext}
  icon: build/icon.ico
  # rcedit 를 통한 .exe 리소스 수정은 활성화 (true 가 default).
  #   - 아이콘: build/icon.ico → 실행파일 내장
  #   - VersionInfo.ProductName / FileDescription: package.json 의 productName 사용
  #   - 작업관리자에 'PLIDE' 로 표시 (이전: 'Electron')
  # 서명은 인증서 환경변수(CSC_LINK 등)가 없으면 자동 skip — 무서명 정책 유지.
  verifyUpdateCodeSignature: false
  # rcedit 가 박는 메타데이터 라벨. 명시하지 않으면 author 필드에서 추출.
  publisherName: PNU PL Lab
  legalTrademarks: PLIDE

nsis:
  artifactName: ${name}-${version}-setup-${arch}.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  createStartMenuShortcut: true
  oneClick: false           # 사용자가 설치 경로 선택 가능 (교내 공용 PC 고려)
  perMachine: false         # 관리자 권한 없이 현재 사용자에 설치
  allowElevation: true
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false  # 사용자 코드가 ~/.pnu-pl-ide 에 남아도 보존
  # ----------------------------------------------------------------------
  # Custom NSIS hooks — 레거시 executable/바로가기 정리.
  #
  #   `executableName: pnu-pl-ide` → `PLIDE` 로 변경되면서, 이전 버전이
  #   설치된 환경에서는 INSTDIR 에 `pnu-pl-ide.exe` 가 그대로 남는다.
  #   appId 는 동일하므로 NSIS 가 같은 INSTDIR 를 재사용하지만, 구 .exe 는
  #   덮어쓰기 대상이 아니어서 작업관리자/시작메뉴에 두 항목이 공존하게 됨.
  #
  #   build/installer.nsh 의 customInstall / customUnInstall 매크로가 구 파일
  #   목록을 명시적으로 Delete 한다 (없으면 Delete 는 silent no-op).
  # ----------------------------------------------------------------------
  include: build/installer.nsh

# ----------------------------------------------------------------------------
# macOS — DMG 전용
#
#  - identity: null      → ad-hoc 서명조차 하지 않음 (완전 무서명)
#  - hardenedRuntime: false → entitlements 무효화. child_process.spawn 제한 없음.
#  - notarize: false     → Apple 공증 건너뜀.
#
#  zip 타겟은 제거됨. 사유:
#    1. shell auto-update (electron-updater) 미사용이므로 zip 아카이브의 원래
#       용도인 업데이트 delta 제공이 불필요.
#    2. dmg 와 동일 바이너리를 중복 패키징해 릴리즈 자산만 약 2배로 불어남
#       (arch 별 zip 이 각각 ~100MB).
#    3. 교육용 배포 정책상 "DMG 로 설치" 한 가지 경로로 학부생 안내를 통일.
#
#  결과: 사용자 첫 실행 시 "열 수 없는 개발자" 경고.
#  우회: Finder 에서 우클릭 → 열기, 또는 `xattr -d com.apple.quarantine …`
#  (안내 문서: docs/phase7-build.md)
# ----------------------------------------------------------------------------
mac:
  category: public.app-category.developer-tools
  artifactName: ${name}-${version}-${arch}.${ext}
  icon: build/icon.icns
  # arch 는 CLI(`--x64` 또는 `--arm64`) 로 결정. yml 에 둘 다 적으면
  # electron-builder 25.x 가 CLI 플래그를 필터로 인식 못 해 양쪽이 모두 빌드됨.
  target:
    - target: dmg
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  notarize: false
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSHumanReadableCopyright: © 2026 PNU PL Lab

dmg:
  artifactName: ${name}-${version}-${arch}.${ext}
  writeUpdateInfo: false
  # 배경 이미지/아이콘 레이아웃 커스터마이즈는 생략 — 기본 DMG 사용.

# ----------------------------------------------------------------------------
# Linux — tar.gz 단일 타겟
#
#  AppImage 타겟은 제거됨. 사유:
#    1. AppImage 실행에는 libfuse2 가 필요한데, 최신 Ubuntu 22.04 LTS 이후 기본
#       설치가 아니어서 학부 실습실에서 "실행이 안 된다" 류 문의가 늘어남.
#    2. 교내 리눅스 배포 관행상 tar.gz 을 `/opt` 또는 `~/apps` 에 풀어 실행
#       파일에 심볼릭 링크를 거는 방식이 더 표준적.
#    3. 릴리즈 자산 크기 축소 — AppImage 가 없으면 Linux 자산이 약 85MB → 40MB.
#
#  tar.gz 한 종만 남기면 배포 경로가 단순해진다: 압축 해제 → 실행 파일 실행.
# ----------------------------------------------------------------------------
linux:
  artifactName: ${name}-${version}-${arch}.${ext}
  target:
    - target: tar.gz
      arch:
        - x64
  maintainer: yonghun83@pusan.ac.kr
  vendor: PNU PL Lab
  category: Development
  synopsis: Mowkow / Kobasic / K-Prolog 통합 교육용 IDE
  description: |
    부산대학교 프로그래밍 언어 연구실에서 개발한 교육용 통합 IDE.
    Mowkow, Kobasic, K-Prolog 세 인터프리터를 한 창에서 실행한다.

# ----------------------------------------------------------------------------
# 배포 — 자동 업데이트 채널 사용하지 않음.
#
#  Interpreter 는 앱 내부 updater (src/main/updater/) 가 S3 에서 받으므로,
#  여기서의 publish 블록은 오직 "electron-builder 가 생성하는 latest.yml 류"
#  와만 관계 있음. 사용하지 않을 것이므로 null.
# ----------------------------------------------------------------------------
publish: null

# ----------------------------------------------------------------------------
# 빌드 가속 — 국내 네트워크에서 Electron 바이너리 다운로드가 느릴 때의 mirror.
# 연구실 내부에서 mirror 를 운영하면 여기를 교체.
# ----------------------------------------------------------------------------
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/

npmRebuild: false
